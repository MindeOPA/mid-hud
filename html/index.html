<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="hud" class="hidden">

    <div id="status-panel">
        <div class="s-circle" id="health-circle">
            <svg viewBox="0 0 80 80" class="c-svg">
                <defs><linearGradient id="g-hp" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ff4757"/><stop offset="100%" style="stop-color:#ff6b81"/></linearGradient></defs>
                <circle cx="40" cy="40" r="34" class="c-bg"/>
                <circle cx="40" cy="40" r="34" class="c-ring" id="health-ring" stroke="url(#g-hp)"/>
            </svg>
            <div class="c-ico health-c"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
            <span class="c-val" id="health-val">100%</span>
        </div>
        <div class="s-circle hidden" id="armor-circle">
            <svg viewBox="0 0 80 80" class="c-svg">
                <defs><linearGradient id="g-ar" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#3742fa"/><stop offset="100%" style="stop-color:#686de0"/></linearGradient></defs>
                <circle cx="40" cy="40" r="34" class="c-bg"/>
                <circle cx="40" cy="40" r="34" class="c-ring" id="armor-ring" stroke="url(#g-ar)"/>
            </svg>
            <div class="c-ico armor-c"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
            <span class="c-val" id="armor-val">0%</span>
        </div>
        <div class="s-circle" id="hunger-circle">
            <svg viewBox="0 0 80 80" class="c-svg">
                <defs><linearGradient id="g-hu" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ff6b35"/><stop offset="100%" style="stop-color:#ff9f43"/></linearGradient></defs>
                <circle cx="40" cy="40" r="34" class="c-bg"/>
                <circle cx="40" cy="40" r="34" class="c-ring" id="hunger-ring" stroke="url(#g-hu)"/>
            </svg>
            <div class="c-ico hunger-c"><svg viewBox="0 0 24 24"><path d="M18.06 22.99h1.66c.84 0 1.53-.65 1.63-1.48L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-4.5-6.77-5-9.53-5-2.76 0-5.5.5-5.5 5v1h15.03v-1z"/></svg></div>
            <span class="c-val" id="hunger-val">100%</span>
        </div>
        <div class="s-circle" id="thirst-circle">
            <svg viewBox="0 0 80 80" class="c-svg">
                <defs><linearGradient id="g-th" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#00d2d3"/><stop offset="100%" style="stop-color:#48dbfb"/></linearGradient></defs>
                <circle cx="40" cy="40" r="34" class="c-bg"/>
                <circle cx="40" cy="40" r="34" class="c-ring" id="thirst-ring" stroke="url(#g-th)"/>
            </svg>
            <div class="c-ico thirst-c"><svg viewBox="0 0 24 24"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2C20 10.48 17.33 6.55 12 2z"/></svg></div>
            <span class="c-val" id="thirst-val">100%</span>
        </div>
        <div class="s-circle" id="stamina-circle">
            <svg viewBox="0 0 80 80" class="c-svg">
                <defs><linearGradient id="g-st" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#feca57"/><stop offset="100%" style="stop-color:#f6e58d"/></linearGradient></defs>
                <circle cx="40" cy="40" r="34" class="c-bg"/>
                <circle cx="40" cy="40" r="34" class="c-ring" id="stamina-ring" stroke="url(#g-st)"/>
            </svg>
            <div class="c-ico stamina-c"><svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg></div>
            <span class="c-val" id="stamina-val">100%</span>
        </div>
        <div class="s-circle hidden" id="oxygen-circle">
            <svg viewBox="0 0 80 80" class="c-svg">
                <defs><linearGradient id="g-ox" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#54a0ff"/><stop offset="100%" style="stop-color:#2e86de"/></linearGradient></defs>
                <circle cx="40" cy="40" r="34" class="c-bg"/>
                <circle cx="40" cy="40" r="34" class="c-ring" id="oxygen-ring" stroke="url(#g-ox)"/>
            </svg>
            <div class="c-ico oxygen-c"><svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg></div>
            <span class="c-val" id="oxygen-val">100%</span>
        </div>
        <div class="s-circle hidden" id="stress-circle">
            <svg viewBox="0 0 80 80" class="c-svg">
                <defs><linearGradient id="g-sr" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ee5a24"/><stop offset="100%" style="stop-color:#fa8231"/></linearGradient></defs>
                <circle cx="40" cy="40" r="34" class="c-bg"/>
                <circle cx="40" cy="40" r="34" class="c-ring" id="stress-ring" stroke="url(#g-sr)"/>
            </svg>
            <div class="c-ico stress-c"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
            <span class="c-val" id="stress-val">0%</span>
        </div>
        <div class="voice-wrap" id="voice-indicator">
            <div class="v-dot" id="voice-dot"></div>
            <svg viewBox="0 0 24 24" class="v-mic" id="voice-mic"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
    </div>

    <div id="loc-panel">
        <div class="loc-row">
            <span class="loc-dir" id="compass-dir">N</span>
            <div class="loc-sep"></div>
            <span class="loc-street" id="loc-street">Unknown</span>
        </div>
        <span class="loc-area" id="loc-area">Los Santos</span>
    </div>

    <div id="top-panel">
        <div class="tp-pill" id="pid-chip">
            <span class="tp-tag">ID</span>
            <span class="tp-val" id="player-id">1</span>
        </div>
        <div class="tp-pill" id="time-chip">
            <svg viewBox="0 0 24 24" class="tp-ico"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
            <span class="tp-val" id="time-val">12:00</span>
        </div>
        <div class="tp-pill tp-money" id="cash-chip">
            <svg viewBox="0 0 24 24" class="tp-ico tp-cash-ico"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
            <span class="tp-val" id="cash-val">$0</span>
        </div>
        <div class="tp-pill tp-money" id="bank-chip">
            <svg viewBox="0 0 24 24" class="tp-ico tp-bank-ico"><path d="M4 10v7h3v-7H4zm6 0v7h3v-7h-3zM2 22h19v-3H2v3zm14-12v7h3v-7h-3zm-4.5-9L2 6v2h19V6l-9.5-5z"/></svg>
            <span class="tp-val" id="bank-val">$0</span>
        </div>
    </div>

    <div id="veh-panel" class="hidden">
        <div class="speedo-wrap">
            <canvas id="speedo-cv" width="260" height="260"></canvas>
            <div class="speedo-center">
                <span class="spd-num" id="spd-num">0</span>
                <span class="spd-unit" id="spd-unit">KM/H</span>
                <span class="spd-gear" id="veh-gear">N</span>
            </div>
        </div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
